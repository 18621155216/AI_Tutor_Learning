<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lesson 07 - Flexbox 练习</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Flexbox：一维布局神器</h1>

  <section class="lab">
    <h2>任务 A：横向排列并居中</h2>
    <div class="container task-a">
      <div class="item">1</div>
      <div class="item">2</div>
      <div class="item">3</div>
    </div>
  </section>

  <section class="lab">
    <h2>任务 B：两端对齐 + 垂直居中</h2>
    <div class="container task-b">
      <div class="item">Logo</div>
      <div class="item">Nav</div>
      <div class="item">Profile</div>
    </div>
  </section>

  <section class="lab">
    <h2>任务 C：允许换行</h2>
    <div class="container task-c">
      <div class="item">A</div>
      <div class="item">B</div>
      <div class="item">C</div>
      <div class="item">D</div>
      <div class="item">E</div>
      <div class="item">F</div>
    </div>
  </section>

  <!-- 任务：在 style.css 中完成注释要求 -->
</body>
</html>
