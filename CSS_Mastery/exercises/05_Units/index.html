<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Lesson 05 - 长度单位练习</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>长度单位：死的 px vs 活的 rem/vw</h1>
  
  <div class="box px-box">
    我是 px 盒子 (300px)
  </div>
  
  <div class="box rem-box">
    我是 rem 盒子 (18.75rem)
  </div>
  
  <div class="box vw-box">
    我是 vw 盒子 (30vw)
  </div>

  <div class="controls">
    <p>任务：</p>
    <ul>
      <li>1. 拉动窗口宽度，观察哪个盒子变了？</li>
      <li>2. 在 style.css 顶部修改 html 的 font-size，看看哪个盒子变了？</li>
    </ul>
  </div>

  <!-- 任务：在 style.css 中通过控制不同的长度单位来观察它们的表现 -->
</body>
</html>
