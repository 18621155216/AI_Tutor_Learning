<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Lesson 01 - 选择器初探</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>CSS 选择器练习</h1>
  
  <p>我是第一个普通段落，我会被所有的 p 标签选择器选中。</p>
  
  <p class="blue-text">我是第二个段落，但我有一个名为 "blue-text" 的类，我想变蓝！</p>
  
  <p id="special-one">我是第三个段落，我有一个唯一的 ID "special-one"，我想变红并加粗！</p>
  
  <div class="blue-text">我虽然是个 div，但我也有 "blue-text" 类，我也想变蓝！</div>

  <!-- 任务：在 style.css 中通过标签、类、ID 选择器来控制这些元素的样式 -->
</body>
</html>
