<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Lesson 03 - 显示模式练习</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>显示模式：块级 vs 行内</h1>
  
  <div class="block-box">
    我是块级元素（div），我默认独占一行。
  </div>
  
  <div class="block-box">
    我是另一个块级元素，我只能排在下面。
  </div>

  <hr>

  <span class="inline-box">我是行内元素（span），我不换行。</span>
  <span class="inline-box">我也是行内元素，我跟在后面。</span>

  <hr>

  <a href="#" class="btn">我是超链接（行内元素），我想变成一个大按钮！</a>

  <!-- 任务：在 style.css 中通过 display 属性控制这些元素的表现 -->
</body>
</html>
