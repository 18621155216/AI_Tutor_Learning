<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        :root {
            --color-red: red;
        }

        div {
            color: var(--color-red);
        }

        .header {
            height: 100px;
            background-color: #250808;
        }

        .content {
            width: 100%;
            height: 500px;
            background-color: #9b2828;
            position: absolute;
        }

        .footer {
            position: absolute;
            height: 100px;
            background-color: #250808;
        }
    </style>
</head>

<body>
    <!-- 定义css变量，使用css变量 -->
    <div class="header">
        我是一个div
    </div>
    <div class="content">
        定位内容区
    </div>
    <div class="footer">
        底部
    </div>
</body>

</html>
