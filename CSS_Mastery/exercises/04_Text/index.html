<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Lesson 04 - 颜色与文本练习</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="article-container">
    <h1 class="main-title">让文字会说话：CSS 文本排版艺术</h1>
    <p class="article-meta">发布日期：2026-04-03 | 作者：CSS 导师</p>
    
    <div class="article-content">
      <p>
        在网页设计中，<span class="highlight">文本排版 (Typography)</span> 是最重要的环节之一。好的排版不仅能让用户更清晰地获取信息，还能传递出页面的情感。
      </p>
      <p>
        通过控制 <span class="property">color</span>（颜色）、<span class="property">font-size</span>（字号）和 <span class="property">line-height</span>（行高），我们可以轻松地将一段普通的文字变得充满活力。
      </p>
      <p>
        CSS 的层叠性意味着你可以给 body 设置一个基础样式，而所有的段落都会自动 <span class="highlight">继承</span> 这些样式。这大大减少了我们重复编写代码的工作量。
      </p>
    </div>
    
    <div class="footer">
      <a href="#" class="more-link">阅读更多相关内容 &raquo;</a>
    </div>
  </div>

  <!-- 任务：在 style.css 中通过控制文本属性来优化这篇文章的排版 -->
</body>
</html>
