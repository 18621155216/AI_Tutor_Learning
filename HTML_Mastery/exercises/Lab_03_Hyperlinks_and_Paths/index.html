<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 03: Hyperlinks & Paths</title>
</head>

<body>
    <!-- 任务 1: 跳转到关于页面的相对路径链接 -->
    <a href="pages/about.html">相对路径链接</a>
    <!-- 任务 2: 跳转到百度或谷歌的外部链接（新窗口打开） -->
    <a href="https://www.google.com" target="_blank">外部链接</a>
    <!-- 任务 3: mailto 链接 -->
    <a href="mailto:example@qq.com">邮箱</a>
    <!-- 任务 4: 跳转到页面底部 footer 的锚点链接 -->
    <a href="#footer">跳转到页面底部</a>
    <div style="height: 1000px;">
        <!-- 这里填充高度，方便测试锚点滚动 -->
        <p>页面内容区域...</p>
    </div>

    <footer id="footer">
        <p>这是页面底部内容</p>
    </footer>
</body>

</html>
