<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 12: Data Tables</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            border: 1px solid #ccc;
            padding: 8px;
            text-align: left;
        }

        th {
            background-color: #f2f2f2;
        }

        caption {
            font-weight: bold;
            margin-bottom: 10px;
        }

        tfoot {
            font-weight: bold;
            background-color: #e9e9e9;
        }
    </style>
</head>

<body>
    <h1>结构化数据表格练习</h1>

    <!-- TODO: 1. 创建一个包含学生成绩信息的表格 -->
    <!-- 任务要求:
        - 添加 <caption>，标题为“2023 年学生成绩单”。
        - 添加 <thead>，包含三列：姓名、语文、数学。
        - 添加 <tbody>，包含至少两名学生的数据。
        - 添加 <tfoot>，包含一行，显示“总计：X 名学生”。
        - 在 <tfoot> 中，使用 colspan 合并单元格，使“总计”信息居中。
        - 为 <th> 标签添加 scope 属性。
    -->
    <table>
        <!-- 在这里编写表格结构 -->
        <caption>2023 年学生成绩单</caption>
        <thead>
            <tr>
                <th scope="col">姓名</th>
                <th scope="col">语文</th>
                <th scope="col">数学</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>张三</td>
                <td>90</td>
                <td>85</td>
            </tr>
            <tr>
                <td>李四</td>
                <td>88</td>
                <td>92</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td colspan="2">总计</td>
                <td>178</td>
            </tr>
        </tfoot>
    </table>

</body>

</html>
