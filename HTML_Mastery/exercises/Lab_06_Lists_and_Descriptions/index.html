<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lab 06: Lists & Descriptions</title>
</head>

<body>
  <h1>列表与描述性数据练习</h1>

  <!-- TODO: 1. 创建一个有序列表 <ol> (学习步骤) -->
  <ol>
    <li>第一步：掌握 HTML5 核心骨架</li>
    <li>第二步：学习文本语义化标签</li>
    <li>第三步：掌握列表与描述性数据</li>
  </ol>
  <!-- TODO: 2. 创建一个无序列表 <ul> (技能树，包含嵌套) -->
  <ul>
    <li>第一项：HTML</li>
    <li>第二项：CSS (在 CSS 下方嵌套一个小列表：Flexbox, Grid)</li>
  </ul>
  <!-- TODO: 3. 创建一个描述列表 <dl> (术语表) -->
  <dl>
    <dt>
      SEO
    </dt>
    <dd>描述</dd>
    <dd>搜索引擎优化</dd>
    <dt>
      A11y
    </dt>
    <dd>描述</dd>
    <dd>可访问性</dd>
  </dl>
</body>

</html>
