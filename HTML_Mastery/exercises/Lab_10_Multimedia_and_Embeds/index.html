<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 10: Multimedia & Embeds</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        video, iframe { width: 100%; max-width: 600px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 8px; }
        h2 { border-left: 4px solid #333; padding-left: 10px; margin-top: 30px; }
    </style>
</head>
<body>
    <h1>多媒体与嵌入式安全练习</h1>

    <!-- TODO: 1. 添加视频展示，带有控制栏和预览图 -->
    <h2>视频播放器</h2>
    <!-- 假设预览图为 images/poster.jpg，视频为 videos/demo.mp4 和 videos/demo.webm -->
    <video controls poster="../../exercises/Lab_07_Image_Optimization/images/large.jpg">
        <source src="videos/demo.mp4" type="video/mp4">
        <source src="videos/demo.webm" type="video/webm">
        您的浏览器不支持 HTML5 视频播放。
    </video>

    <!-- TODO: 2. 安全嵌入外部页面 (iframe)，使用 sandbox -->
    <h2>安全内联框架</h2>
    <iframe src="https://www.wikipedia.org" 
            sandbox="allow-scripts" 
            loading="lazy" 
            title="维基百科示例">
    </iframe>

</body>
</html>
